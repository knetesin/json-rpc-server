# Builds and deploys the docs/ folder to GitHub Pages on every push to main.
#
# Requirements (one-time, in GitHub repository settings):
#   Settings → Pages → Build and deployment → Source: GitHub Actions
#
# After the first run completes the site is served at
#   https://<owner>.github.io/<repo>/
# (URL pinned in docs/_config.yml).

name: Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time. In-flight deployments are cancelled
# in favour of the most recent commit.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: docs

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build site
        env:
          JEKYLL_ENV: production
          # Cayman theme reads repo metadata; shallow CI checkout has no origin remote.
          PAGES_REPO_NWO: ${{ github.repository }}
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
